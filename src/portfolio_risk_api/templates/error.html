{% extends "base.html" %}
{% block title %}{{ ui.error.title }} | Portfolio Risk API{% endblock %}
{% block content %}
  <section class="error-panel">
    <p class="eyebrow">{{ ui.error.eyebrow }}</p>
    <h1>{{ ui.error.title }}</h1>
    <p>{{ message }}</p>
    <p class="field-note">{{ ui.error.schema }}</p>
    <div class="actions">
      <a class="button primary" href="/demo?lang={{ lang }}">{{ ui.error.back }}</a>
      <a class="button" href="/demo/sample-report?lang={{ lang }}">{{ ui.error.sample }}</a>
    </div>
  </section>
{% endblock %}
